name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: skryba
          POSTGRES_USER: skryba
          POSTGRES_PASSWORD: skryba
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skryba"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://skryba:skryba@localhost:5432/skryba
      DEBUG: "true"
      SECRET_KEY: ci-test-secret-key
      SEARCH_CONFIG: simple

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Kontrola Django (check)
        run: python manage.py check

      - name: Testy (pytest)
        run: pytest -q --create-db

      - name: Kontrola wdrożeniowa (check --deploy)
        env:
          DEBUG: "false"
          SECRET_KEY: bardzo-dlugi-losowy-klucz-produkcyjny-do-walidacji-1234567890
          ALLOWED_HOSTS: example.com
        run: python manage.py check --deploy
