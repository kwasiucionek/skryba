# nginx dla Skryby (Django/gunicorn w Dockerze).
# Wzorzec jak w pozostałych aplikacjach cytr.us: nginx na hoście słucha na
# porcie z Mikrusa i proxuje do kontenera web na 127.0.0.1.
#
# Listen ustaw na swój port z Mikrusa. Cloudflare (cytr.us) terminuje TLS i
# kieruje ruch na <serwer>.mikr.us:<port> po HTTP — dlatego w .env trzymaj
# SECURE_SSL_REDIRECT=false (X-Forwarded-Proto z Cloudflare→origin to http).

server {
    listen 44332;
    server_name skryba.cytr.us pro01.mikr.us;

    # Skany i PDF-y bywają duże — domyślny limit nginx to 1M, podnosimy.
    client_max_body_size 50M;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Statyki serwuje WhiteNoise w aplikacji, więc nie ma osobnego /static/
    # alias (w odróżnieniu od TaxPilota). Jeśli chcesz odciążyć Django,
    # zamontuj wolumen staticfiles na hosta i dodaj tu location /static/.

    location / {
        proxy_pass         http://127.0.0.1:8000;   # kontener web
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # OCR i zapytania RAG (/ask/) potrafią chwilę trwać — zapytanie do LLM
        # leci w trakcie żądania. Hojne timeouty.
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }
}
